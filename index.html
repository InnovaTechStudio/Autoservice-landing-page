<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoService | Digital Management for Workshops</title>

        content="AutoService is a digital management platform for automotive workshops. Manage vehicles, work orders, billing and customer tracking in one place." />
    <link rel="stylesheet" href="style.css" />

<body>

            </a>

            <nav class="navbar__menu" id="navbarMenu">
                <a href="#hero" class="navbar__link navbar__link--active">Home</a>
